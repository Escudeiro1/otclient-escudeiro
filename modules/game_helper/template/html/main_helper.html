<link href="template/css/helper_main.css" />

<html>
<window id="helperWindow" class="helperWindow" placement="center" title="Helper" onescape="self:doCloseWindow()">

    <!-- Tab bar -->
    <div class="helperTabBar">
        <UIButton id="tabHealing" class="helperTabBtn helperTabActive">
            <label class="helperTabLabel">Healing</label>
        </UIButton>
    </div>

    <!-- Body: STATUS float:left + right col float:left -->
    <div class="helperBody">

        <!-- Left: STATUS panel (162px float:left) -->
        <div class="helperStatusPanel">
            <div class="helperStatusInner"> Status
                <label class="helperSectionTitle"></label>
                <div class="statusToggleRow">
                    <button class="statusOkBtn">OK</button>
                    <button class="statusNoBtn">X</button>
                </div>
                <label class="statusEnabledLabel">Helper Status: Enabled</label>
                <div class="helperDivider"></div>
                <div class="helperSubTitleRow">
                    <label class="helperSubTitle">Auto Haste</label>
                </div>
                <input class="helperCheck" type="checkbox" text="Enable" />
                <input class="helperCheck" type="checkbox" text="PZ Cast" />
                <div class="helperDivider"></div>
                <div class="helperSubTitleRow">
                    <label class="helperSubTitle">Others Tools</label>
                    <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                </div>
                <input class="helperCheck" type="checkbox" checked text="Auto Eat Food" />
            </div>
        </div>

        <!-- Right column (626px float:left) -->
        <div class="helperRightCol">

            <!-- Top: Spell (190) + Potion (190) + Mana (238) = 626px -->
            <div class="helperTopSection">
                <div class="healBlock">
                    <div class="healBlockInner">
                        <label class="healBlockTitle">Spell Healing</label>
                        <div class="healRow">
                            <UIButton id="sh_slot_1" class="spellSlot" onclick="self:onSlotClick('sh', 1)"><img id="sh_icon_1" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('sh', 1, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('sh', 1)"><label id="sh_val_1" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('sh', 1, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="healRow">
                            <UIButton id="sh_slot_2" class="spellSlot" onclick="self:onSlotClick('sh', 2)"><img id="sh_icon_2" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('sh', 2, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('sh', 2)"><label id="sh_val_2" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('sh', 2, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="healRow">
                            <UIButton id="sh_slot_3" class="spellSlot" onclick="self:onSlotClick('sh', 3)"><img id="sh_icon_3" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('sh', 3, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('sh', 3)"><label id="sh_val_3" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('sh', 3, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                    </div>
                </div>
                <!-- Vertical Separator -->
                <div class="verticalSeparator"></div>

                <div class="healBlock">
                    <div class="healBlockInner">
                        <label class="healBlockTitle">Potion Healing</label>
                        <div class="healRow">
                            <UIButton id="ph_slot_1" class="spellSlot" onclick="self:onSlotClick('ph', 1)"><img id="ph_icon_1" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('ph', 1, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('ph', 1)"><label id="ph_val_1" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('ph', 1, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="healRow">
                            <UIButton id="ph_slot_2" class="spellSlot" onclick="self:onSlotClick('ph', 2)"><img id="ph_icon_2" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('ph', 2, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('ph', 2)"><label id="ph_val_2" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('ph', 2, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="healRow">
                            <UIButton id="ph_slot_3" class="spellSlot" onclick="self:onSlotClick('ph', 3)"><img id="ph_icon_3" class="spellIcon" /></UIButton>
                            <UIButton class="arrowBtnLeft" onclick="self:onArrowClick('ph', 3, -1)"></UIButton>
                            <UIButton class="spinValBtn" onclick="self:onValueClick('ph', 3)"><label id="ph_val_3" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnRight" onclick="self:onArrowClick('ph', 3, 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                    </div>
                </div>
                <!-- Vertical Separator -->
                <div class="verticalSeparator"></div>

                <div class="manaBlock">
                    <div class="manaBlockInner">
                        <label class="healBlockTitle">Mana Training</label>
                        <div class="manaRow">
                            <UIButton id="mh_slot_1" class="spellSlot" onclick="self:onSlotClick('mh', 1)"><img id="mh_icon_1" class="spellIcon" /></UIButton>
                            <input class="manaCheck" type="checkbox" text="Enable" />
                            <UIButton class="spinValBtn" onclick="self:onValueClick('mh', 1)"><label id="mh_val_1" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnDown" onclick="self:onValueClick('mh', 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                    </div>
                </div>
            </div>
            <!-- Horizontal Separator -->
            <div class="horizontalSeparator"></div>
            <!-- Bottom: sel(106)+list(152)+sel(106)+listWide(250) = 626px -->
            <div class="helperFriendSection">
                <div class="friendSelector">
                    <div class="friendSelectorInner">
                        <div class="helperSubTitleRow">
                            <label class="helperSubTitle">Select a Friend</label>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="friendScrollArea UIScrollArea" layout="type:verticalBox"></div>
                    </div>
                </div>
                <div class="friendListBlock">
                    <div class="friendListInner">
                        <label class="healBlockTitle">Sio Friend List</label>
                        <div class="friendEntry">
                            <button class="friendAddBtn">+</button>
                            <input class="friendEntryCheck" type="checkbox" text="Enable Sio" />
                            <UIButton class="spinValBtn" onclick="self:onValueClick('sio', 1)"><label id="sio_val_1" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnDown" onclick="self:onValueClick('sio', 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="friendEntry">
                            <button class="friendAddBtn">+</button>
                            <input class="friendEntryCheck" type="checkbox" text="Enable Sio" />
                            <UIButton class="spinValBtn" onclick="self:onValueClick('sio', 2)"><label id="sio_val_2" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnDown" onclick="self:onValueClick('sio', 2)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                    </div>
                </div>
                <div class="friendSelector">
                    <div class="friendSelectorInner">
                        <div class="helperSubTitleRow">
                            <label class="helperSubTitle">Select a Friend</label>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="friendScrollArea UIScrollArea" layout="type:verticalBox"></div>
                    </div>
                </div>
                <div class="friendListBlockWide">
                    <div class="friendListInner">
                        <label class="healBlockTitle">Gran Sio Friend List</label>
                        <div class="friendEntry">
                            <button class="friendAddBtn">+</button>
                            <input class="friendEntryCheck" type="checkbox" text="Enable" />
                            <UIButton class="spinValBtn" onclick="self:onValueClick('gsio', 1)"><label id="gsio_val_1" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnDown" onclick="self:onValueClick('gsio', 1)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                        <div class="friendEntry">
                            <button class="friendAddBtn">+</button>
                            <input class="friendEntryCheck" type="checkbox" text="Enable" />
                            <UIButton class="spinValBtn" onclick="self:onValueClick('gsio', 2)"><label id="gsio_val_2" class="spinValLabel"></label></UIButton>
                            <UIButton class="arrowBtnDown" onclick="self:onValueClick('gsio', 2)"></UIButton>
                            <img class="infoIconSm" src="/images/skin/show-gui-help-grey" />
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <!-- Bottom bar: Set Helper Key (float:left) + Close (float:right) -->
    <div class="helperBottomBar">
        <button class="helperFooterBtnLeft">Set Helper Key</button>
        <button class="helperFooterBtnRight" onclick="self:hide()">Close</button>
    </div>

</window>
</html>
